<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDD Soluções - Nossos Serviços</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .montage-wrapper {
            max-width: 900px; 
            width: 100%;
        }

        /* Logo Section */
        .montage-header {
            background-color: transparent; 
            text-align: center;
            padding: 10px 0; /* Reduced padding */
            margin-bottom: 20px;
        }

        .montage-header img {
            /* CHANGED: Reduced from 400px to 180px */
            max-width: 180px; 
            width: 100%;
            height: auto;
            /* Optional: Removed shadow/border-radius for a cleaner logo feel */
        }

        /* Service Cards */
        .service-item {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .service-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .service-label {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #105ba1; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="montage-wrapper">
        
        <div class="montage-header">
            <img src="1000680382.dddazul.jpg" alt="DDD Soluções Logo">
        </div>

        <div class="service-item">
            <img src="Post DDD-3 (1).limpeza.png" alt="Limpeza">
            <div class="service-label">Limpeza</div>
        </div>
                    <div class="service-item">
                <img src="Post DDD-1.jardins.png" alt="Jardinagem">
            </div>

        <div class="service-item">
            <img src="Post DDD-2.sofa.png" alt="Estofos">
            <div class="service-label">Estofos</div>
        </div>

    </div>

</body>
</html>
